<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Defense Simulation Lab - Akhil Akash Bindla</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto+Mono&display=swap" rel="stylesheet">
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/intro.css"> <!-- for matrix rain & glitch -->
</head>
<body class="lab-body">
  <!-- Subtle Matrix Rain Background -->
  <canvas id="matrix-rain"></canvas>

  <!-- Header -->
  <header class="lab-header">
    <h1>AI Defense Simulation Lab</h1>
    <p>Controlled environment to evaluate prompt patterns and AI security mechanisms</p>
  </header>

  <!-- Initialization Animation -->
  <div id="init-terminal" class="terminal">
    <div id="init-output"></div>
  </div>

  <!-- Main Simulation Panel -->
  <div id="simulation-panel" class="simulation-panel" style="display: none;">
    <div class="input-section">
      <label for="test-input">Enter sample input to evaluate:</label>
      <textarea id="test-input" placeholder="Type any message, command, or potential prompt here..." rows="5"></textarea>
      <button id="evaluate-btn">Evaluate Input</button>
    </div>

    <div id="result-section" class="result-section" style="display: none;">
      <div id="threat-indicator" class="threat-indicator"></div>
      <h3 id="result-title"></h3>
      <p id="result-category"></p>
      <p id="result-score"></p>
      <p id="result-action"></p>
      <div id="explanation" class="explanation"></div>
    </div>

    <div class="nav-buttons">
      <a href="index.html" class="btn btn-secondary">Return to Homepage</a>
      <a href="portfolio.html" class="btn btn-secondary">Open Portfolio</a>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/lab.js"></script>
</body>
</html>
